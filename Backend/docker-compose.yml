version: '3.8'
services:
  db:
    image: postgres:15
    container_name: nest_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ttsuy
      POSTGRES_PASSWORD: root
      POSTGRES_DB: precifica_db
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
